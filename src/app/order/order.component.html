<div class="orders-bg">
  <div class="container">
    <h2 class="orders-title text-center">📦 Your Orders</h2>
    <div class="row g-4">
      <div class="col-md-4" *ngFor="let item of orders$ | async">
        <div class="order-card">

          <div class="img-box">
            <img [src]="item.image" class="order-img">
          </div>

          <div class="order-body">
            <h5 class="name">{{ item.name }}</h5>
            <p class="desc">{{ item.description }}</p>
            <div class="price">
              ₹ {{ item.price }}
            </div>
            <span class="status">✔ Ordered</span>
          </div>

          <div class="order-footer">
            <button class="remove-btn" (click)="removeOrder(item.orderId)">Remove</button>

            <button class="ordered-btn" disabled>Ordered</button>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
